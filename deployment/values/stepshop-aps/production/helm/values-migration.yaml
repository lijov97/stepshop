namespace: 'stepshop-aps'

app_name: 'stepshop-aps'

job:
  name: 'stepshop-aps-migration-job'
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 60
  serviceAccountName: 'stepora-stepshop-aps-vault'

  containers:
    - name: 'migration'
      imagePullPolicy: 'Always'
      image: '211535858832.dkr.ecr.ap-south-1.amazonaws.com/production/stepora/stepshop-aps/backend-app:[BUILD_TAG]'
      command: '["sh", "-c", "/bin/cp -f /vault/secrets/application.env /etc/profile.d/application-env.sh ; source /etc/profile.d/application-env.sh ; python3.7 manage.py migrate --noinput >> /stepora/logs/app.out.migration.log 2>&1"]'
      memory:
        requests: 1000Mi
        limits: 1500Mi
      cpu:
        requests: 1000m
        limits: 1500m
      volumeMounts:
        - mountPath: '/stepora/logs/'
          name: 'stepora-stepshop-aps-production-migration-logs'
        - name: 'stepshop-aps-app-env-volume'
          mountPath: "/vault/secrets"
        - name: 'stepshop-aps-certs-msk-volume'
          mountPath: "/stepora/certs/msk"

  volumes:
    - name: 'stepora-stepshop-aps-production-migration-logs'
      hostPath:
        path: '/home/ec2-user/stepora-logs/stepora-stepshop-aps-production/migration'
    - name: 'stepshop-aps-app-env-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "stepshop-aps-envs"
    - name: 'stepshop-aps-certs-msk-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "stepshop-aps-certs-msk"

  nodeSelector:
    key: 'karpenter.sh/nodepool'
    value: 'default'
  priorityClassName: 'production-critical'
  restartPolicy: 'Never'
  terminationGracePeriodSeconds: 120
